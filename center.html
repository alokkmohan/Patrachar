<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>पत्राचार शिक्षा संस्थान, UP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2c5e 0%, #1a4a8a 50%, #0f2c5e 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 52px;
      margin-bottom: 12px;
    }

    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-bottom: 36px;
      letter-spacing: 0.3px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 36px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 28px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
      text-align: left;
    }

    .btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-form {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      box-shadow: 0 6px 20px rgba(39,174,96,0.35);
    }

    .btn-dash {
      background: linear-gradient(135deg, #e67e22, #ca6f1e);
      box-shadow: 0 6px 20px rgba(230,126,34,0.35);
    }

    .btn-icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .btn-text .btn-title {
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      display: block;
      margin-bottom: 3px;
    }

    .btn-text .btn-sub {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      display: block;
    }

    .footer {
      margin-top: 32px;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">🎓</div>
    <h1>पत्राचार शिक्षा संस्थान, UP</h1>
    <p class="subtitle">UP Madhyamik Shiksha Vibhag &nbsp;|&nbsp; सत्र 2025–26</p>
    <hr class="divider">

    <div class="btn-group">

      <a class="btn btn-form" href="https://pcform.dataimpact.in" target="_blank">
        <span class="btn-icon">📝</span>
        <span class="btn-text">
          <span class="btn-title">पंजीकरण फॉर्म भरें</span>
          <span class="btn-sub">Fill Registration Form</span>
        </span>
      </a>

      <a class="btn btn-dash" href="https://pctrack.dataimpact.in" target="_blank">
        <span class="btn-icon">📊</span>
        <span class="btn-text">
          <span class="btn-title">डैशबोर्ड / प्रगति देखें</span>
          <span class="btn-sub">View Dashboard &amp; Track Progress</span>
        </span>
      </a>

    </div>
  </div>

  <div class="footer">
    Patrachar Shiksha Sansthan &nbsp;·&nbsp; dataimpact.in
  </div>

</body>
</html>
